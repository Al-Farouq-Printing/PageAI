<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PageAI — Published Site</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body style="background:#0A0A0A; color:#eee; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
<p id="msg">Loading…</p>
<script src="firebase-init.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  (async () => {
    if (!id) { document.getElementById('msg').textContent = 'No site id provided.'; return; }
    try {
      const doc = await db.collection('sites').doc(id).get();
      if (!doc.exists) { document.getElementById('msg').textContent = 'Site not found.'; return; }
      document.open();
      document.write(doc.data().html);
      document.close();
    } catch (err) {
      document.getElementById('msg').textContent = 'Failed to load site.';
    }
  })();
</script>
</body>
</html>
